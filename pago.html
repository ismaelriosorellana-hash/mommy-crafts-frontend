<body class="account-page payment-result-page">
    <header class="account-header">
        <div class="container account-header-inner">
            <a class="account-brand" href="index.html" aria-label="Ir a Mommy Crafts">
                <img src="https://res.cloudinary.com/jo3bgrnh/image/upload/v1782320550/LOGO_MOMMY_CRAFTS_PNGG_mpgyfl.png" alt="">

        </div>
    </header>

    <main class="account-main">
        <section class="payment-result-card" id="payment-result-card" aria-live="polite">
            <div class="payment-result-icon loading" id="payment-result-icon">
                <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
            <p class="section-kicker">Mercado Pago</p>
            <h1 id="payment-result-title">Comprobando tu pago</h1>
            <p id="payment-result-message">Estamos consultando el estado real del pedido.</p>
            <div class="payment-result-order" id="payment-result-order" hidden></div>
            <div class="payment-result-actions">
                <button class="btn-primary" id="payment-retry" type="button" hidden>
                    Intentar pago nuevamente
                </button>
                <a class="btn-secondary" id="payment-account-link" href="cuenta.html#pedidos" hidden>
                    Ver mis pedidos
                </a>
                <a class="btn-secondary" href="catalogo.html">Seguir comprando</a>
            </div>
        </section>
